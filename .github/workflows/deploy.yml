name: Deploy

# Runs on every push to main. Two independent jobs: redeploy the Cloudflare
# Worker, and publish frontend/ to GitHub Pages via the Actions-based
# deployment method (NOT the classic branch+path method - that only accepts
# "/" or "/docs" as source.path, and this template serves from "/frontend").
#
# GitHub Pages must be enabled ONCE, manually, before this workflow's
# deploy-pages job can publish anything: Settings -> Pages -> Build and
# deployment -> Source: "GitHub Actions". infra/provision.sh cannot do this
# for you - creating/enabling a repo's Pages site is an administrative action
# GITHUB_TOKEN is never permitted to perform, under any configuration. See
# README's bootstrap prerequisites.
#
# Uses repo secrets CF_WORKER_NAME (written by provision.sh, or set manually -
# see README/provision.sh's write_repo_secrets() comments if that step failed)
# and the organization-level CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"  # wrangler's pinned version requires Node >=22

      - run: npm ci

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --name "${{ secrets.CF_WORKER_NAME }}"

  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - id: deployment
        uses: actions/deploy-pages@v4
