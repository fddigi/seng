<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Senge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 20px auto; padding: 0 12px; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
    .toggle { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #666; }
    table { border-collapse: collapse; width: 100%; font-size: 0.9rem; table-layout: fixed; }
    th, td { padding: 6px 8px; border-bottom: 1px solid #ddd; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* Desktop-kolonnebredder - Titel skal have mest plads, Handling mindst.
       2026-07-23: Mærke og Handling udvidet lidt for at give plads til
       hhv. ✎-rette-mærke og 📌-pin-knap ved siden af de eksisterende.
       2026-07-23 (bruger-feedback): desktop-tabellen manglede thumbnails som
       mobil-kortene allerede havde - "PC browser view skal have samme
       standard som mobilen". Tilføjet som egen 1. kolonne. */
    th:nth-child(1), td:nth-child(1) { width: 6%; }
    th:nth-child(2), td:nth-child(2) { width: 8%; }
    th:nth-child(3), td:nth-child(3) { width: 13%; }
    th:nth-child(4), td:nth-child(4) { width: 17%; }
    th:nth-child(5), td:nth-child(5) { width: 32%; white-space: normal; }
    th:nth-child(6), td:nth-child(6) { width: 13%; }
    th:nth-child(7), td:nth-child(7) { width: 11%; }
    td.thumb-cell { padding: 4px; }
    .table-thumb, .table-thumb-placeholder {
      width: 40px; height: 40px; border-radius: 4px; object-fit: cover;
      background: #f3f4f6; display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    th button { background: none; border: none; font: inherit; font-weight: 600; cursor: pointer; padding: 0; }
    a.row-link { color: #0645ad; text-decoration: none; }
    a.row-link:hover { text-decoration: underline; }
    .empty-state { text-align: center; color: #888; padding: 20px; }
    .dismiss-badge { font-size: 0.75em; color: #a33; margin-left: 6px; }
    button.row-action { font-size: 0.8rem; padding: 2px 8px; cursor: pointer; }
    /* UX-sprint 2026-07-23 (Opus-kritik): pris er det vigtigste i en række -
       fremhæv den fremfor at lade alle kolonner se ens ud. */
    td.price-cell { font-weight: 700; }
    #active-filters-note { color: #666; font-size: 0.85rem; }
    #reset-filters { display: none; }

    /* Pin/favorit - genbruger ejendompython-mønsteret (lys-gul baggrund på
       fastgjorte rækker, samme farvekoder). Fastgjorte annoncer springer
       pris/mærke/søgefilter over og sorteres altid øverst (se applySort). */
    tr.pinned td { background: #fefce8; }
    tr.pinned:hover td { background: #fef9c3; }
    .listing-card.pinned { background: #fefce8; border-color: #fde68a; }
    button.icon-btn {
      background: none; border: none; cursor: pointer; font-size: 0.9rem;
      padding: 0 2px; opacity: 0.55; line-height: 1;
    }
    button.icon-btn.active, button.icon-btn:hover { opacity: 1; }
    .inline-actions { display: flex; align-items: center; gap: 4px; }
    .card-brand-wrap { display: flex; align-items: center; gap: 4px; }

    /* Fortryd-besked efter "Afvis" - undgår at kræve "Vis også afviste" +
       "Genskab" for en handling der lige er sket (UX-feedback 2026-07-23). */
    #undo-toast {
      display: none; align-items: center; gap: 10px; font-size: 0.9rem;
      background: #fef3c7; border: 1px solid #fde68a; border-radius: 6px;
      padding: 8px 12px; margin: 10px 0;
    }
    #undo-toast button { cursor: pointer; font-weight: 600; }

    /* Manuel tilføjelse - skjult indtil "+ Tilføj annonce" klikkes. */
    #manual-add-form {
      display: none; gap: 8px; flex-wrap: wrap; align-items: center;
      margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 6px;
      background: #f9fafb;
    }
    #manual-add-form input { padding: 5px 7px; }

    /* UX-sprint 2026-07-23, runde 2 (Opus-spec): det label-per-række mønster
       (samme som PA SPEAKERS brugte) var for højt på mobil - 5 felter x
       label+værdi-linje blev 250-300px pr. kort, kun 1-2 synlige ad gangen.
       I stedet: et HELT SEPARAT, kompakt kort-layout (billede+3 tætpakkede
       linjer, ~90-95px), vist via #listings-cards og skjult på desktop -
       tabellen forbliver uændret der. To DOM-repræsentationer bygget fra
       samme data i samme render-løkke er simplere end at tvinge en
       tabel-struktur til at se ud som et billedkort via CSS-reorder. */
    #listings-cards { display: none; }
    .listing-card {
      display: flex; gap: 10px; padding: 8px 10px; margin: 8px 0;
      border: 1px solid #ddd; border-radius: 6px; position: relative;
    }
    .card-thumb, .card-thumb-placeholder {
      flex: 0 0 64px; width: 64px; height: 64px; border-radius: 6px;
      background: #f3f4f6; object-fit: cover;
    }
    .card-thumb-placeholder { display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .card-content { flex: 1; min-width: 0; padding-right: 60px; }
    .card-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .card-price { font-size: 1.05rem; font-weight: 700; white-space: nowrap; }
    .card-brand { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: .3px; }
    .card-title {
      font-size: 0.875rem; line-height: 1.3; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-title a { color: #0645ad; text-decoration: none; }
    .card-seen { font-size: 0.7rem; color: #9ca3af; margin-top: 4px; }
    .card-action {
      position: absolute; top: 8px; right: 10px;
      padding: 4px 10px; font-size: 0.75rem; border-radius: 14px; cursor: pointer;
    }
    @media (max-width: 640px) {
      #listings-table { display: none; }
      #listings-cards { display: block; }
      .empty-state { text-align: center; display: block; padding: 20px; color: #888; }
    }
  </style>
</head>
<body>
  <h1>Senge (kolonihave)</h1>
  <p>Logget ind som <span id="whoami">...</span> (<button id="logout">log ud</button>)</p>

  <div class="controls">
    <input type="text" id="filter-search" placeholder="Filtrér efter titel/mål..." />
    <select id="brand-filter">
      <option value="">Alle mærker</option>
      <option value="__any__">Kun med kendt mærke</option>
    </select>
    <label class="toggle">
      Maks pris:
      <input type="number" id="max-price-filter" value="800" min="0" step="50" style="width: 80px" />
      kr
      <button type="button" id="clear-price-filter" title="Fjern prisgrænse, vis alt">Vis alt</button>
    </label>
    <label class="toggle">
      <input type="checkbox" id="show-stale-toggle" />
      Vis også formodet solgte
    </label>
    <label class="toggle">
      <input type="checkbox" id="show-dismissed-toggle" />
      Vis også afviste
    </label>
    <button id="reload">Genindlæs</button>
    <button id="reset-filters" type="button">Nulstil filtre</button>
    <button id="show-add-form" type="button">+ Tilføj annonce</button>
  </div>
  <p id="active-filters-note"></p>

  <form id="manual-add-form">
    <input type="text" id="add-title" placeholder="Titel" required style="flex: 1 1 220px" />
    <input type="url" id="add-url" placeholder="Link (dba.dk, Facebook Marketplace, ...)" required style="flex: 1 1 260px" />
    <input type="number" id="add-price" placeholder="Pris (kr)" min="0" step="1" style="width: 100px" />
    <input type="text" id="add-brand" placeholder="Mærke (valgfrit)" style="width: 140px" />
    <button type="submit">Tilføj</button>
    <button type="button" id="cancel-add-form">Annullér</button>
  </form>

  <div id="undo-toast"></div>

  <table id="listings-table">
    <thead>
      <tr>
        <th></th>
        <th data-key="price_dkk" data-numeric="true"><button type="button">Pris<span class="sort-indicator"></span></button></th>
        <th data-key="brand"><button type="button">Mærke<span class="sort-indicator"></span></button></th>
        <th data-key="target"><button type="button">Mål<span class="sort-indicator"></span></button></th>
        <th data-key="title"><button type="button">Titel<span class="sort-indicator"></span></button></th>
        <th data-key="first_seen"><button type="button">Først set<span class="sort-indicator"></span></button></th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div id="listings-cards"></div>
  <p id="count-line"></p>
  <p id="error" style="color: red"></p>

  <script src="config.js"></script>
  <script>
    let allListings = [];
    let sortKey = "price_dkk", sortAsc = true;
    let showStale = false;
    let showDismissed = false;
    let brandFilter = ""; // "" = alle, "__any__" = kun ønskemærker, ellers et konkret mærkenavn
    // Standard-prisfilter (2026-07-22, brugerens eget valg): 2000 kr var for
    // højt til at være nyttigt som default - INGEN data fjernes nogensinde,
    // dette er kun et render-filter (samme princip som stale/dismissed
    // ovenfor) man selv kan hæve/fjerne med "Vis alt".
    let maxPriceFilter = 800;

    // En annonce der ikke er genberørt (last_seen) i mere end dette anses for
    // sandsynligvis solgt/nedtaget - samme begrundelse/grænse som PA SPEAKERS-
    // projektets tilsvarende "skjul solgte"-funktion.
    const STALE_HOURS = 48;

    // Supplement 2026-07-23: "misses" (scraper/pipeline.py) tæller forgæves
    // scrapes i træk af samme mål - mere robust end en ren tidsgrænse, da
    // scrape-kadencen er uregelmæssig (nogle gange <1t mellem kørsler, andre
    // gange 6+). En annonce der er væk fra 3 scrapes i træk er formodet
    // solgt/fjernet, uanset hvor lang tid der reelt er gået.
    const STALE_MISS_THRESHOLD = 3;

    function isStale(row) {
      if ((row.misses ?? 0) >= STALE_MISS_THRESHOLD) return true;
      if (!row.last_seen) return false;
      return Date.now() - new Date(row.last_seen).getTime() > STALE_HOURS * 3600 * 1000;
    }

    function isDismissed(row) {
      return !!row.dismissed;
    }

    function isPinned(row) {
      return !!row.pinned;
    }

    function authHeaders() {
      const token = localStorage.getItem("session_token");
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    async function requireSession() {
      if (!localStorage.getItem("session_token")) {
        window.location.href = "login.html";
        return null;
      }
      const res = await fetch(`${API_BASE}/api/me`, { headers: authHeaders() });
      if (!res.ok) {
        localStorage.removeItem("session_token");
        window.location.href = "login.html";
        return null;
      }
      return res.json();
    }

    async function loadListings() {
      const res = await fetch(`${API_BASE}/api/listings`, { headers: authHeaders() });
      if (!res.ok) {
        document.getElementById("error").textContent = "Kunne ikke hente data.";
        return;
      }
      const { listings } = await res.json();
      allListings = listings;
      renderBrandFilter();
      applySort();
      renderTable();
    }

    // Dynamisk populeret ud fra hvilke mærker der reelt findes i dataen -
    // samme mønster som PA SPEAKERS-projektets kategori-filter.
    function renderBrandFilter() {
      const select = document.getElementById("brand-filter");
      const previousValue = select.value;
      const brands = [...new Set(allListings.map((r) => r.brand).filter(Boolean))].sort();
      select.innerHTML = '<option value="">Alle mærker</option><option value="__any__">Kun med kendt mærke</option>';
      for (const brand of brands) {
        const option = document.createElement("option");
        option.value = brand;
        option.textContent = brand.charAt(0).toUpperCase() + brand.slice(1);
        select.appendChild(option);
      }
      select.value = [...brands, "", "__any__"].includes(previousValue) ? previousValue : "";
      brandFilter = select.value;
    }

    async function setDismissed(itemKey, dismissed) {
      const path = dismissed ? "dismiss" : "undismiss";
      const res = await fetch(`${API_BASE}/api/listings/${encodeURIComponent(itemKey)}/${path}`, {
        method: "POST",
        headers: authHeaders(),
      });
      if (!res.ok) {
        document.getElementById("error").textContent = "Kunne ikke opdatere annoncen.";
        return;
      }
      // Opdatér lokalt i stedet for at genindlæse hele listen - annoncen findes
      // stadig i allListings (kun render-filteret ændrer sig), samme mønster
      // som stale-hiding: data slettes aldrig, kun skjules/vises.
      const row = allListings.find((r) => r.item_key === itemKey);
      if (row) {
        row.dismissed = dismissed ? 1 : 0;
        row.dismissed_reason = dismissed ? "manual" : null;
      }
      renderTable();
    }

    // Pin/favorit - genbruger ejendompython/proqual-mønsteret: en simpel
    // boolean-flag, togglet via en 📌-knap, som sorterer fastgjorte annoncer
    // øverst og lader dem springe pris/mærke/søgefilter over (se applySort/
    // renderTable). Data slettes/ændres aldrig andet end selve pin-flaget.
    async function setPinned(itemKey, pinned) {
      const path = pinned ? "pin" : "unpin";
      const res = await fetch(`${API_BASE}/api/listings/${encodeURIComponent(itemKey)}/${path}`, {
        method: "POST",
        headers: authHeaders(),
      });
      if (!res.ok) {
        document.getElementById("error").textContent = "Kunne ikke opdatere pin.";
        return;
      }
      const row = allListings.find((r) => r.item_key === itemKey);
      if (row) row.pinned = pinned ? 1 : 0;
      applySort();
      renderTable();
    }

    // Manuel mærke-rettelse for annoncer hvor auto-genkendelsen ikke fangede
    // et reelt ønske-mærke (fx en "Jensen seng" uden ordet i titlen). Sætter
    // brand_manual = 1 server-side, hvilket beskytter rettelsen mod at blive
    // overskrevet af scraperens næste re-sync (se pipeline.py).
    async function setBrand(itemKey, brand) {
      const res = await fetch(`${API_BASE}/api/listings/${encodeURIComponent(itemKey)}/brand`, {
        method: "POST",
        headers: { ...authHeaders(), "Content-Type": "application/json" },
        body: JSON.stringify({ brand }),
      });
      if (!res.ok) {
        document.getElementById("error").textContent = "Kunne ikke opdatere mærke.";
        return;
      }
      const row = allListings.find((r) => r.item_key === itemKey);
      if (row) {
        row.brand = brand || null;
        row.brand_manual = 1;
      }
      renderBrandFilter();
      renderTable();
    }

    function promptEditBrand(row) {
      const input = window.prompt("Mærke:", row.brand ?? "");
      if (input === null) return; // annulleret
      setBrand(row.item_key, input.trim() || null);
    }

    // Fortryd-besked lige efter "Afvis" - før krævede en fortrydelse at man
    // slog "Vis også afviste" til og fandt rækken igen for at trykke
    // "Genskab" (bruger-feedback 2026-07-23: for besværligt til en handling
    // der lige skete). Vises KUN ved afvisning, ikke ved genskab.
    let undoToastTimer = null;

    function hideUndoToast() {
      document.getElementById("undo-toast").style.display = "none";
      clearTimeout(undoToastTimer);
    }

    function showUndoToast(itemKey, title) {
      clearTimeout(undoToastTimer);
      const toast = document.getElementById("undo-toast");
      toast.innerHTML = "";
      toast.style.display = "flex";
      const text = document.createElement("span");
      text.textContent = `Afvist: "${title}".`;
      toast.appendChild(text);
      const undoBtn = document.createElement("button");
      undoBtn.type = "button";
      undoBtn.textContent = "Fortryd";
      undoBtn.addEventListener("click", () => {
        setDismissed(itemKey, false);
        hideUndoToast();
      });
      toast.appendChild(undoBtn);
      undoToastTimer = setTimeout(hideUndoToast, 8000);
    }

    function applySort() {
      const th = document.querySelector(`#listings-table th[data-key="${sortKey}"]`);
      const numeric = th?.dataset.numeric === "true";
      allListings.sort((a, b) => {
        // Fastgjorte annoncer ligger altid øverst (ejendompython-mønster),
        // uanset hvilken kolonne der er valgt til sortering - internt
        // imellem dem gælder stadig den valgte sortering.
        const pinDiff = (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
        if (pinDiff !== 0) return pinDiff;
        const av = a[sortKey], bv = b[sortKey];
        if (numeric) return sortAsc ? (av ?? 0) - (bv ?? 0) : (bv ?? 0) - (av ?? 0);
        return sortAsc
          ? String(av ?? "").localeCompare(String(bv ?? ""))
          : String(bv ?? "").localeCompare(String(av ?? ""));
      });
      document.querySelectorAll("#listings-table th[data-key]").forEach((el) => {
        const indicator = el.querySelector(".sort-indicator");
        if (el.dataset.key === sortKey) {
          indicator.textContent = sortAsc ? "▲" : "▼";
        } else {
          indicator.textContent = "";
        }
      });
    }

    // UX-sprint 2026-07-23 (Opus-kritik): standard-prisfilteret (800 kr) er et
    // "skjult" filter - en ny bruger ser færre senge end der findes uden at
    // vide hvorfor. Vis derfor altid eksplicit hvilke filtre der er aktive.
    function getActiveFilterNotes() {
      const notes = [];
      if (maxPriceFilter != null) notes.push(`pris ≤ ${maxPriceFilter} kr`);
      if (brandFilter === "__any__") notes.push("kun med kendt mærke");
      else if (brandFilter) notes.push(`mærke: ${brandFilter}`);
      const search = document.getElementById("filter-search").value.trim();
      if (search) notes.push(`søgning: "${search}"`);
      return notes;
    }

    function resetFilters() {
      document.getElementById("filter-search").value = "";
      document.getElementById("brand-filter").value = "";
      document.getElementById("max-price-filter").value = "";
      brandFilter = "";
      maxPriceFilter = null;
      renderTable();
    }

    // UX-sprint 2026-07-23 runde 2 (Opus-spec): kompakt mobil-kort - billede
    // (eller pladsholder) til venstre, tre tætpakkede linjer til højre
    // (pris+mærke / titel / først-set), handling som en hjørne-pille i
    // stedet for en fuld linje. ~90-95px pr. kort mod ~250-300px før.
    function buildCard(row) {
      const card = document.createElement("div");
      card.className = "listing-card" + (isPinned(row) ? " pinned" : "");

      if (row.image_url) {
        const img = document.createElement("img");
        img.className = "card-thumb";
        img.src = row.image_url;
        img.loading = "lazy";
        img.alt = "";
        card.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.className = "card-thumb-placeholder";
        placeholder.textContent = "🛏";
        card.appendChild(placeholder);
      }

      const content = document.createElement("div");
      content.className = "card-content";

      const top = document.createElement("div");
      top.className = "card-top";

      const pinBtn = document.createElement("button");
      pinBtn.type = "button";
      pinBtn.className = "icon-btn" + (isPinned(row) ? " active" : "");
      pinBtn.title = isPinned(row) ? "Fjern pin" : "Pin øverst";
      pinBtn.textContent = "📌";
      pinBtn.addEventListener("click", () => setPinned(row.item_key, !isPinned(row)));
      top.appendChild(pinBtn);

      const price = document.createElement("span");
      price.className = "card-price";
      price.textContent = row.price_dkk != null ? `${Math.round(row.price_dkk)} kr` : "?";
      top.appendChild(price);
      const brandWrap = document.createElement("span");
      brandWrap.className = "card-brand-wrap";
      if (row.brand) {
        const brand = document.createElement("span");
        brand.className = "card-brand";
        brand.textContent = row.brand;
        brandWrap.appendChild(brand);
      }
      const editBrandBtn = document.createElement("button");
      editBrandBtn.type = "button";
      editBrandBtn.className = "icon-btn";
      editBrandBtn.title = "Ret mærke";
      editBrandBtn.textContent = "✎";
      editBrandBtn.addEventListener("click", () => promptEditBrand(row));
      brandWrap.appendChild(editBrandBtn);
      top.appendChild(brandWrap);
      if (isDismissed(row)) {
        const badge = document.createElement("span");
        badge.className = "dismiss-badge";
        badge.textContent = row.dismissed_reason === "manual" ? "(afvist manuelt)" : `(${row.dismissed_reason ?? "afvist"})`;
        top.appendChild(badge);
      }
      content.appendChild(top);

      const title = document.createElement("div");
      title.className = "card-title";
      const link = document.createElement("a");
      link.href = row.url ?? "#";
      link.target = "_blank";
      link.rel = "noopener";
      link.textContent = row.title ?? "";
      title.appendChild(link);
      content.appendChild(title);

      const seen = document.createElement("div");
      seen.className = "card-seen";
      seen.textContent = (row.first_seen ?? "").slice(0, 16).replace("T", " ");
      content.appendChild(seen);

      card.appendChild(content);

      const actionBtn = document.createElement("button");
      actionBtn.type = "button";
      actionBtn.className = "card-action";
      actionBtn.textContent = isDismissed(row) ? "Genskab" : "Afvis";
      actionBtn.addEventListener("click", () => {
        const next = !isDismissed(row);
        setDismissed(row.item_key, next);
        if (next) showUndoToast(row.item_key, row.title ?? "");
      });
      card.appendChild(actionBtn);

      return card;
    }

    function renderTable() {
      const search = document.getElementById("filter-search").value.toLowerCase().trim();
      const tbody = document.querySelector("#listings-table tbody");
      const cardsContainer = document.getElementById("listings-cards");
      tbody.innerHTML = "";
      cardsContainer.innerHTML = "";

      const staleHidden = showStale ? 0 : allListings.filter((r) => !isDismissed(r) && isStale(r)).length;
      const dismissedHidden = showDismissed ? 0 : allListings.filter(isDismissed).length;

      const filtered = allListings.filter((row) => {
        if (!showDismissed && isDismissed(row)) return false;
        if (!showStale && isStale(row)) return false;
        // Fastgjorte annoncer springer pris/mærke/søgefilter over (samme
        // "pinned bypasser filtre"-logik som ejendompython) - dismissed/stale
        // styrer stadig, det er ikke en "vis for evigt uanset alt"-flag.
        if (isPinned(row)) return true;
        if (brandFilter === "__any__" && !row.brand) return false;
        if (brandFilter && brandFilter !== "__any__" && row.brand !== brandFilter) return false;
        // Ukendt pris (null) skjules ALDRIG af prisgrænsen - vi kan ikke
        // vurdere den mod grænsen, og at skjule den ville kunne skjule en
        // reelt interessant annonce blot fordi prisen ikke kunne udlæses.
        if (maxPriceFilter != null && row.price_dkk != null && row.price_dkk > maxPriceFilter) return false;
        if (!search) return true;
        const haystack = `${row.title ?? ""} ${row.target ?? ""}`.toLowerCase();
        return haystack.includes(search);
      });

      const activeFilterNotes = getActiveFilterNotes();
      const filterNote = document.getElementById("active-filters-note");
      const resetBtn = document.getElementById("reset-filters");
      if (activeFilterNotes.length > 0) {
        filterNote.textContent = `Aktive filtre: ${activeFilterNotes.join(", ")}`;
        resetBtn.style.display = "inline-block";
      } else {
        filterNote.textContent = "";
        resetBtn.style.display = "none";
      }

      const suffixParts = [];
      if (dismissedHidden > 0) suffixParts.push(`${dismissedHidden} afvist${dismissedHidden === 1 ? "" : "e"}`);
      if (staleHidden > 0) suffixParts.push(`${staleHidden} formodet solgt${staleHidden === 1 ? "" : "e"}`);
      const countSuffix = suffixParts.length > 0 ? ` (${suffixParts.join(", ")} skjult)` : "";

      if (filtered.length === 0) {
        let emptyText;
        if (allListings.length === 0) {
          emptyText = "Ingen annoncer endnu.";
        } else if (activeFilterNotes.length > 0) {
          emptyText = `Ingen annoncer matcher filteret (${activeFilterNotes.join(", ")}).`;
        } else {
          emptyText = "Ingen annoncer matcher filteret.";
        }
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 7;
        td.className = "empty-state";
        td.textContent = emptyText;
        tr.appendChild(td);
        tbody.appendChild(tr);
        const emptyCard = document.createElement("p");
        emptyCard.className = "empty-state";
        emptyCard.textContent = emptyText;
        cardsContainer.appendChild(emptyCard);
        document.getElementById("count-line").textContent =
          `${filtered.length} af ${allListings.length} annoncer vist${countSuffix}`;
        return;
      }

      for (const row of filtered) {
        cardsContainer.appendChild(buildCard(row));

        const tr = document.createElement("tr");
        if (isPinned(row)) tr.classList.add("pinned");

        const thumbCell = document.createElement("td");
        thumbCell.className = "thumb-cell";
        if (row.image_url) {
          const img = document.createElement("img");
          img.className = "table-thumb";
          img.src = row.image_url;
          img.loading = "lazy";
          img.alt = "";
          thumbCell.appendChild(img);
        } else {
          const placeholder = document.createElement("div");
          placeholder.className = "table-thumb-placeholder";
          placeholder.textContent = "🛏";
          thumbCell.appendChild(placeholder);
        }
        tr.appendChild(thumbCell);

        const priceCell = document.createElement("td");
        priceCell.className = "price-cell";
        priceCell.dataset.label = "Pris";
        priceCell.textContent = row.price_dkk != null ? `${Math.round(row.price_dkk)} kr` : "?";
        tr.appendChild(priceCell);

        const brandCell = document.createElement("td");
        brandCell.dataset.label = "Mærke";
        const brandWrap = document.createElement("span");
        brandWrap.className = "inline-actions";
        const brandText = document.createElement("span");
        brandText.textContent = row.brand ? row.brand.charAt(0).toUpperCase() + row.brand.slice(1) : "-";
        brandWrap.appendChild(brandText);
        const editBrandBtn = document.createElement("button");
        editBrandBtn.type = "button";
        editBrandBtn.className = "icon-btn";
        editBrandBtn.title = "Ret mærke";
        editBrandBtn.textContent = "✎";
        editBrandBtn.addEventListener("click", () => promptEditBrand(row));
        brandWrap.appendChild(editBrandBtn);
        brandCell.appendChild(brandWrap);
        tr.appendChild(brandCell);

        const targetCell = document.createElement("td");
        targetCell.dataset.label = "Mål";
        targetCell.textContent = row.target ?? "";
        tr.appendChild(targetCell);

        const titleCell = document.createElement("td");
        titleCell.dataset.label = "Titel";
        const link = document.createElement("a");
        link.className = "row-link";
        link.href = row.url ?? "#";
        link.target = "_blank";
        link.rel = "noopener";
        link.textContent = row.title ?? "";
        titleCell.appendChild(link);
        if (isDismissed(row)) {
          const badge = document.createElement("span");
          badge.className = "dismiss-badge";
          badge.textContent = row.dismissed_reason === "manual" ? "(afvist manuelt)" : `(${row.dismissed_reason ?? "afvist"})`;
          titleCell.appendChild(badge);
        }
        tr.appendChild(titleCell);

        const seenCell = document.createElement("td");
        seenCell.dataset.label = "Først set";
        seenCell.textContent = (row.first_seen ?? "").slice(0, 16).replace("T", " ");
        tr.appendChild(seenCell);

        const actionCell = document.createElement("td");
        actionCell.dataset.label = "Handling";
        const actionsWrap = document.createElement("span");
        actionsWrap.className = "inline-actions";

        const pinBtn = document.createElement("button");
        pinBtn.type = "button";
        pinBtn.className = "icon-btn" + (isPinned(row) ? " active" : "");
        pinBtn.title = isPinned(row) ? "Fjern pin" : "Pin øverst";
        pinBtn.textContent = "📌";
        pinBtn.addEventListener("click", () => setPinned(row.item_key, !isPinned(row)));
        actionsWrap.appendChild(pinBtn);

        const actionBtn = document.createElement("button");
        actionBtn.type = "button";
        actionBtn.className = "row-action";
        // "Afvis"/"afvist" (ikke "Skjul") - matcher toggle-navnet "Vis også
        // afviste" og badge-teksten "(afvist manuelt)" 1:1 (UX-kritik
        // 2026-07-23: "Skjul" og "afvist" var to forskellige ord for samme
        // handling, forvirrende ved første øjekast).
        actionBtn.textContent = isDismissed(row) ? "Genskab" : "Afvis";
        actionBtn.addEventListener("click", () => {
          const next = !isDismissed(row);
          setDismissed(row.item_key, next);
          if (next) showUndoToast(row.item_key, row.title ?? "");
        });
        actionsWrap.appendChild(actionBtn);
        actionCell.appendChild(actionsWrap);
        tr.appendChild(actionCell);

        tbody.appendChild(tr);
      }

      document.getElementById("count-line").textContent =
        `${filtered.length} af ${allListings.length} annoncer vist${countSuffix}`;
    }

    document.querySelectorAll("#listings-table th[data-key]").forEach((th) => {
      th.querySelector("button").addEventListener("click", () => {
        const key = th.dataset.key;
        sortAsc = sortKey === key ? !sortAsc : true;
        sortKey = key;
        applySort();
        renderTable();
      });
    });

    document.getElementById("filter-search").addEventListener("input", renderTable);
    document.getElementById("reload").addEventListener("click", loadListings);
    document.getElementById("brand-filter").addEventListener("change", (event) => {
      brandFilter = event.target.value;
      renderTable();
    });
    document.getElementById("max-price-filter").addEventListener("input", (event) => {
      const value = event.target.value.trim();
      maxPriceFilter = value === "" ? null : Number(value);
      renderTable();
    });
    document.getElementById("clear-price-filter").addEventListener("click", () => {
      document.getElementById("max-price-filter").value = "";
      maxPriceFilter = null;
      renderTable();
    });
    document.getElementById("reset-filters").addEventListener("click", resetFilters);
    document.getElementById("show-stale-toggle").addEventListener("change", (event) => {
      showStale = event.target.checked;
      renderTable();
    });
    document.getElementById("show-dismissed-toggle").addEventListener("change", (event) => {
      showDismissed = event.target.checked;
      renderTable();
    });

    // Manuel tilføjelse - for annoncer scraperen aldrig selv finder (fx
    // Facebook Marketplace, se worker/src/index.ts's POST /api/listings).
    // Skriver direkte til Turso og genindlæser bagefter (enkleste korrekte
    // løsning - undgår at duplikere serverens item_key/dedup-logik i JS).
    document.getElementById("show-add-form").addEventListener("click", () => {
      const form = document.getElementById("manual-add-form");
      form.style.display = form.style.display === "flex" ? "none" : "flex";
    });
    document.getElementById("cancel-add-form").addEventListener("click", () => {
      const form = document.getElementById("manual-add-form");
      form.reset();
      form.style.display = "none";
    });
    document.getElementById("manual-add-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const title = document.getElementById("add-title").value.trim();
      const url = document.getElementById("add-url").value.trim();
      const priceVal = document.getElementById("add-price").value.trim();
      const brandVal = document.getElementById("add-brand").value.trim();
      if (!title || !url) return;
      const res = await fetch(`${API_BASE}/api/listings`, {
        method: "POST",
        headers: { ...authHeaders(), "Content-Type": "application/json" },
        body: JSON.stringify({
          title,
          url,
          price_dkk: priceVal ? Number(priceVal) : undefined,
          brand: brandVal || undefined,
        }),
      });
      if (!res.ok) {
        document.getElementById("error").textContent = "Kunne ikke tilføje annoncen.";
        return;
      }
      const form = document.getElementById("manual-add-form");
      form.reset();
      form.style.display = "none";
      await loadListings();
    });

    document.getElementById("logout").addEventListener("click", async () => {
      await fetch(`${API_BASE}/logout`, { method: "POST", headers: authHeaders() }).catch(() => {});
      localStorage.removeItem("session_token");
      window.location.href = "login.html";
    });

    (async () => {
      const me = await requireSession();
      if (!me) return;
      document.getElementById("whoami").textContent = me.username;
      await loadListings();
    })();
  </script>
</body>
</html>
